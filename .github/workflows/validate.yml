name: Validate skill.md Structure

on:
  push:
    paths:
      - "skill.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "tests/validate_structure.py"
      - "tests/utils.py"
      - ".claude-plugin/plugin.json"
      - ".claude-plugin/marketplace.json"
      - ".codex-plugin/plugin.json"
      - "gemini-extension.json"
  pull_request:
    paths:
      - "skill.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "tests/validate_structure.py"
      - "tests/utils.py"
      - ".claude-plugin/plugin.json"
      - ".claude-plugin/marketplace.json"
      - ".codex-plugin/plugin.json"
      - "gemini-extension.json"

jobs:
  validate:
    name: Structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate skill.md structure
        run: uv run tests/validate_structure.py --verbose

      - name: Lint tests/
        run: uvx ruff check tests/
